<!DOCTYPE html>
<html>
<head>
  <style>
    :root {
      --neon-pink: #ff00ff;
      --neon-cyan: #00ffff;
      --dark-bg: #030305;
      --grid-color: rgba(0, 255, 255, 0.05);
    }
    
    body {
      width: 360px;
      margin: 0;
      padding: 15px;
      background-color: var(--dark-bg);
      background-image: 
        linear-gradient(var(--grid-color) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
      background-size: 20px 20px;
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      border: 1px solid var(--neon-cyan);
      box-shadow: inset 0 0 20px rgba(0,255,255,0.1);
      position: relative;
    }

    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
      z-index: 100;
      background-size: 100% 3px;
      pointer-events: none;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 10px;
      margin-bottom: 15px;
    }

    h2 { 
      color: var(--neon-pink); 
      margin: 0; 
      text-transform: uppercase; 
      font-size: 18px; 
      letter-spacing: 2px;
      text-shadow: 0 0 5px rgba(255,0,255,0.5);
    }

    .status-badge {
      font-size: 9px;
      background: rgba(0,255,255,0.1);
      color: var(--neon-cyan);
      padding: 2px 5px;
      border: 1px solid var(--neon-cyan);
    }

    .panel {
      background: rgba(5,5,5,0.9);
      border: 1px solid rgba(0,255,255,0.2);
      padding: 10px;
      margin-bottom: 15px;
      position: relative;
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
    }

    .panel-label {
      font-size: 10px;
      color: var(--neon-cyan);
      margin-bottom: 5px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      height: 70px;
      background: transparent;
      color: var(--neon-cyan);
      border: 1px dashed rgba(0,255,255,0.3);
      padding: 8px;
      box-sizing: border-box;
      resize: none;
      font-family: inherit;
      font-size: 12px;
    }

    textarea:focus { 
      outline: none; 
      border-color: var(--neon-pink); 
      box-shadow: inset 0 0 10px rgba(255,0,255,0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: rgba(0,255,255,0.05);
      color: var(--neon-cyan);
      border: 1px solid var(--neon-cyan);
      font-weight: bold;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.2s;
      text-transform: uppercase;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    button:hover { 
      background: var(--neon-cyan); 
      color: #000; 
      box-shadow: 0 0 15px rgba(0,255,255,0.5);
    }

    #result { 
      margin-top: 15px; 
      font-size: 11px; 
      min-height: 60px;
    }

    .log-line { margin-bottom: 4px; color: #aaa; }
    .log-line span { color: var(--neon-yellow); }

    .high-risk { color: var(--neon-pink); font-weight: bold; text-shadow: 0 0 5px var(--neon-pink); }
    .safe { color: var(--neon-cyan); font-weight: bold; text-shadow: 0 0 5px var(--neon-cyan); }
    
    .progress-bar {
      width: 100%;
      height: 4px;
      background: #111;
      margin-top: 5px;
      position: relative;
      overflow: hidden;
    }
    
    .progress-fill {
      position: absolute;
      top: 0; left: 0; height: 100%;
      background: var(--neon-cyan);
      width: 0%;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>AEGIS-SWARM</h2>
    <div class="status-badge" id="statusBadge">UPLINK_READY</div>
  </div>

  <div class="panel">
    <div class="panel-label">> ACTIVE_TARGET</div>
    <textarea id="payload" placeholder="Awaiting target..."></textarea>
  </div>

  <button id="scanBtn">INITIATE_SCAN //</button>

  <div class="panel" style="margin-top: 15px; min-height: 80px;">
    <div class="panel-label">> SYS_OUTPUT</div>
    <div id="result">
      <div style="opacity: 0.5;">Waiting for telemetry...</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
